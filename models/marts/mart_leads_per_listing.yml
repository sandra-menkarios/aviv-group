version: 2

models:
  - name: mart_leads_per_listing
    description: >
      Core business metric: leads per active listing, aggregated by
      property_type × region. Joins from the core fct/dim layer.
      Powers conversion-tier dashboards, regional performance tracking,
      and marketing spend optimisation.
    config:
      contract:
        enforced: true
    columns:
      - name: property_type
        data_type: varchar
        description: "Property segment (apartment, house, parking)."
        tests:
          - not_null

      - name: region
        data_type: varchar
        description: "Administrative region."
        tests:
          - not_null

      - name: active_listing_count
        data_type: bigint
        description: "Number of active listings in this segment."
        tests:
          - not_null

      - name: total_leads
        data_type: bigint
        description: "Sum of all leads received by active listings in this segment."
        tests:
          - not_null

      - name: leads_per_listing
        data_type: double
        description: >
          Key business KPI: total_leads / active_listing_count, rounded to 2dp.
          High values signal strong demand; low values may indicate pricing or
          marketing gaps.

      - name: min_leads
        data_type: bigint
        description: "Minimum lead count on any single listing in the segment."

      - name: max_leads
        data_type: bigint
        description: "Maximum lead count on any single listing in the segment."

      - name: avg_leads
        data_type: double
        description: "Mean lead count per listing in the segment."

      - name: listings_with_no_leads
        data_type: bigint
        description: >
          Count of active listings with zero leads. A high ratio flags
          under-served inventory worth investigating or re-pricing.

unit_tests:

  - name: test_zero_lead_listings_included_in_denominator
    description: >
      The mart LEFT JOINs leads onto active listings, so a listing with zero
      leads still contributes to active_listing_count and listings_with_no_leads.
      An INNER JOIN would silently drop it, overstating leads_per_listing and
      hiding under-served inventory from product/marketing teams.
    model: mart_leads_per_listing
    given:
      - input: ref('dim_listing')
        rows:
          - {listing_id: 'L1', property_type: 'apartment', region: 'IDF', city: 'Paris', agent_id: 'A01', price: 300000, is_active: true, is_current: true, created_at: '2025-01-01', updated_at: '2025-01-15'}
          - {listing_id: 'L2', property_type: 'apartment', region: 'IDF', city: 'Paris', agent_id: 'A02', price: 250000, is_active: true, is_current: true, created_at: '2025-01-01', updated_at: '2025-01-15'}
      - input: ref('fct_leads')
        rows:
          - {contact_id: 'C1', listing_id: 'L1'}
          # L2 receives no leads — it must still appear in active_listing_count
    expect:
      rows:
        - {property_type: 'apartment', region: 'IDF', active_listing_count: 2, total_leads: 1, leads_per_listing: 0.5, listings_with_no_leads: 1}

  - name: test_leads_per_listing_rounds_to_two_decimal_places
    description: >
      leads_per_listing = total_leads / active_listing_count, rounded to 2 d.p.
      Three parking listings with 3 + 3 + 1 = 7 leads produce 7 / 3 = 2.333...,
      which must round to 2.33 — not truncate, not carry extra precision.
      This guards against accidental integer division or wrong rounding scale.
    model: mart_leads_per_listing
    given:
      - input: ref('dim_listing')
        rows:
          - {listing_id: 'L1', property_type: 'parking', region: 'PACA', city: 'Marseille', agent_id: 'A01', price: 10000, is_active: true, is_current: true, created_at: '2025-01-01', updated_at: '2025-01-15'}
          - {listing_id: 'L2', property_type: 'parking', region: 'PACA', city: 'Marseille', agent_id: 'A02', price: 12000, is_active: true, is_current: true, created_at: '2025-01-01', updated_at: '2025-01-15'}
          - {listing_id: 'L3', property_type: 'parking', region: 'PACA', city: 'Marseille', agent_id: 'A03', price: 11000, is_active: true, is_current: true, created_at: '2025-01-01', updated_at: '2025-01-15'}
      - input: ref('fct_leads')
        rows:
          - {contact_id: 'C1', listing_id: 'L1'}
          - {contact_id: 'C2', listing_id: 'L1'}
          - {contact_id: 'C3', listing_id: 'L1'}
          - {contact_id: 'C4', listing_id: 'L2'}
          - {contact_id: 'C5', listing_id: 'L2'}
          - {contact_id: 'C6', listing_id: 'L2'}
          - {contact_id: 'C7', listing_id: 'L3'}
    expect:
      rows:
        - {property_type: 'parking', region: 'PACA', active_listing_count: 3, total_leads: 7, leads_per_listing: 2.33}
