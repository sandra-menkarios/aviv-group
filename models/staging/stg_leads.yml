version: 2

models:
  - name: stg_leads
    description: >
      Thin pass over raw_leads: rename columns to warehouse conventions,
      cast types, and trim whitespace. No business logic.
    columns:
      - name: contact_id
        data_type: varchar
        description: "Unique contact identifier (PK)."
        tests:
          - unique:
              name: stg_leads_contact_id_unique
          - not_null

      - name: listing_id
        data_type: varchar
        description: "Foreign key → stg_listings.listing_id."
        tests:
          - not_null
          - relationships:
              name: stg_leads_listing_id_exists
              arguments:
                to: ref('stg_listings')
                field: listing_id

      - name: contact_source
        data_type: varchar
        description: "Acquisition channel from source (whitespace-trimmed)."
        tests:
          - not_null

      - name: contact_timestamp
        data_type: timestamp
        description: "Timestamp when the contact event was submitted."
        tests:
          - not_null
