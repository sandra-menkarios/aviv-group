version: 2

# ─────────────────────────────────────────────────────────────────────────────
# SOURCES  (production reference — in Snowflake these are raw tables loaded
#           via COPY INTO or Snowpipe; locally we use dbt seeds instead)
# ─────────────────────────────────────────────────────────────────────────────
sources:
  - name: raw
    description: >
      Raw layer: daily CSV snapshots ingested from S3 into Snowflake.
      In local development these are simulated by dbt seeds.
    database: "{{ env_var('DBT_DATABASE', 'SELOGER_DW') }}"
    schema: raw
    tables:
      - name: listings
        description: "Daily snapshot of active property listings from the SeLoger feed."
        loaded_at_field: updated_at
        freshness:
          warn_after: { count: 25, period: hour }
          error_after: { count: 49, period: hour }
        columns:
          - name: listing_id
            description: "Primary key — unique listing identifier."
          - name: property_type
            description: "Raw property type string (apartment, house, parking)."
          - name: city
            description: "City where the property is located."
          - name: region
            description: "Administrative region."
          - name: price
            description: "Listed price in EUR."
          - name: agent_id
            description: "Agent responsible for the listing."
          - name: created_at
            description: "Timestamp when the listing was first published."
          - name: updated_at
            description: "Timestamp of the most recent listing update."

      - name: leads
        description: "Contact/lead events submitted by users on listings."
        loaded_at_field: contact_timestamp
        freshness:
          warn_after: { count: 25, period: hour }
          error_after: { count: 49, period: hour }
        columns:
          - name: contact_id
            description: "Primary key — unique contact identifier."
          - name: listing_id
            description: "Foreign key → listings.listing_id."
          - name: contact_source
            description: "Acquisition channel: organic, paid, partner."
          - name: contact_timestamp
            description: "Timestamp when the contact event was submitted."

# ─────────────────────────────────────────────────────────────────────────────
# STAGING MODELS
# ─────────────────────────────────────────────────────────────────────────────
models:
  - name: stg_listings
    description: >
      Cleaned and normalized property listings. Casts types, trims whitespace,
      standardizes casing, and derives the is_active flag (updated within the
      last 180 days relative to the dataset's most recent update).
    columns:
      - name: listing_id
        description: "Unique listing identifier (PK)."
        tests:
          - unique:
              # Business risk: duplicate listing_id would inflate lead counts
              # and misrepresent inventory size in mart metrics.
              name: stg_listings_listing_id_unique
          - not_null

      - name: property_type
        description: "Normalised property type: apartment, house, or parking."
        tests:
          - not_null
          - accepted_values:
              name: stg_listings_property_type_valid
              # Business risk: unknown types would silently create untracked
              # segments and skew the leads_per_listing metric.
              arguments:
                values: ['apartment', 'house', 'parking']

      - name: city
        description: "City name (title-cased)."
        tests:
          - not_null

      - name: region
        description: "Administrative region."
        tests:
          - not_null

      - name: price
        description: "Listing price in EUR."
        tests:
          - not_null

      - name: agent_id
        description: "Responsible agent identifier."
        tests:
          - not_null

      - name: created_at
        description: "Listing creation timestamp."
        tests:
          - not_null

      - name: updated_at
        description: "Latest listing update timestamp."
        tests:
          - not_null

      - name: is_active
        description: >
          True if the listing was updated within 180 days of the dataset's
          most recent record. False = stale listing excluded from mart metrics.

  - name: stg_leads
    description: >
      Cleaned and normalized lead/contact events. Casts types, trims whitespace,
      and normalises contact_source values to lowercase.
    columns:
      - name: contact_id
        description: "Unique contact identifier (PK)."
        tests:
          - unique:
              # Business risk: duplicate leads would inflate conversion metrics
              # and lead attribution numbers.
              name: stg_leads_contact_id_unique
          - not_null

      - name: listing_id
        description: "Foreign key → stg_listings.listing_id."
        tests:
          - not_null
          - relationships:
              name: stg_leads_listing_id_exists
              # Business risk: orphaned leads (listing deleted from feed before
              # lead arrived) would silently drop from metrics without this check.
              arguments:
                to: ref('stg_listings')
                field: listing_id

      - name: contact_source
        description: "Acquisition channel, normalised to lowercase."
        tests:
          - not_null
          - accepted_values:
              name: stg_leads_contact_source_valid
              # Business risk: unknown sources would be invisible in channel-mix
              # reporting, causing marketing budget misallocation.
              arguments:
                values: ['organic', 'paid', 'partner']

      - name: contact_timestamp
        description: "Timestamp when the contact event was submitted."
        tests:
          - not_null
