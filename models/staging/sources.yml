version: 2

sources:
  - name: raw
    description: >
      Raw layer: daily CSV snapshots ingested from S3 into Snowflake.
      In local development these are simulated by dbt seeds.
    database: "{{ env_var('DBT_DATABASE', target.database) }}"
    schema: "{{ 'main_raw' if target.type == 'duckdb' else 'raw' }}"
    tables:
      - name: listings
        description: "Daily snapshot of active property listings from the SeLoger feed."
        identifier: "{{ 'raw_listings' if target.type == 'duckdb' else 'listings' }}"
        loaded_at_field: updated_at
        freshness:
          warn_after: { count: 25, period: hour }
          error_after: { count: 49, period: hour }
        columns:
          - name: listing_id
            description: "Primary key."
            tests:
              - unique
              - not_null

          - name: property_type
            description: "Raw property type string."
            tests:
              - not_null

          - name: city
            description: "City where the property is located."
            tests:
              - not_null

          - name: region
            description: "Administrative region."
            tests:
              - not_null

          - name: price
            description: "Listed price in EUR."
            tests:
              - not_null

          - name: agent_id
            description: "Agent responsible for the listing."
            tests:
              - not_null

          - name: created_at
            description: "Listing creation timestamp."
            tests:
              - not_null

          - name: updated_at
            description: "Most recent listing update timestamp."
            tests:
              - not_null

      - name: leads
        description: "Contact/lead events submitted by users on listings."
        identifier: "{{ 'raw_leads' if target.type == 'duckdb' else 'leads' }}"
        loaded_at_field: contact_timestamp
        freshness:
          warn_after: { count: 25, period: hour }
          error_after: { count: 49, period: hour }
        columns:
          - name: contact_id
            description: "Primary key."
            tests:
              - unique
              - not_null

          - name: listing_id
            description: "FK → listings.listing_id."
            tests:
              - not_null

          - name: contact_source
            description: "Acquisition channel: organic, paid, partner."
            tests:
              - not_null

          - name: contact_timestamp
            description: "Timestamp of the contact event."
            tests:
              - not_null
