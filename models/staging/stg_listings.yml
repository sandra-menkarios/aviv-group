version: 2

models:
  - name: stg_listings
    description: >
      Thin pass over raw_listings: rename columns to warehouse conventions,
      cast types, and trim whitespace. No business logic.
    columns:
      - name: listing_id
        data_type: varchar
        description: "Unique listing identifier (PK)."
        tests:
          - unique:
              name: stg_listings_listing_id_unique
          - not_null

      - name: property_type
        data_type: varchar
        description: "Raw property type string from source (whitespace-trimmed)."
        tests:
          - not_null

      - name: city
        data_type: varchar
        description: "City name (whitespace-trimmed)."
        tests:
          - not_null

      - name: region
        data_type: varchar
        description: "Administrative region (whitespace-trimmed)."
        tests:
          - not_null

      - name: price
        data_type: decimal(12,2)
        description: "Listing price in EUR."
        tests:
          - not_null

      - name: agent_id
        data_type: varchar
        description: "Responsible agent identifier."
        tests:
          - not_null

      - name: created_at
        data_type: timestamp
        description: "Listing creation timestamp."
        tests:
          - not_null

      - name: updated_at
        data_type: timestamp
        description: "Latest listing update timestamp."
        tests:
          - not_null
