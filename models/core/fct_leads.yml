version: 2

models:
  - name: fct_leads
    description: >
      Lead fact table: one row per contact event (grain = contact_id).
      Denormalises listing attributes from dim_listing so marts can aggregate
      without additional joins. contact_date is the date key for dim_date joins.
      Materialized as a table because it is the primary target of mart aggregations.
    config:
      contract:
        enforced: true
    columns:
      - name: contact_id
        data_type: varchar
        description: "Primary key — unique contact/lead identifier."
        tests:
          - unique
          - not_null

      - name: listing_id
        data_type: varchar
        description: "Foreign key → dim_listing.listing_id."
        tests:
          - not_null
          - relationships:
              name: fct_leads_listing_id_exists
              arguments:
                to: ref('dim_listing')
                field: listing_id

      - name: contact_date
        data_type: date
        description: "Date key (YYYY-MM-DD) — joins to dim_date.date_day."
        tests:
          - not_null
          - relationships:
              name: fct_leads_contact_date_in_dim_date
              arguments:
                to: ref('dim_date')
                field: date_day

      - name: contact_source
        data_type: varchar
        description: "Acquisition channel: organic, paid, or partner."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['organic', 'paid', 'partner']

      - name: contact_timestamp
        data_type: timestamp
        description: "Full timestamp of the contact event."
        tests:
          - not_null

      - name: property_type
        data_type: varchar
        description: "Denormalized from dim_listing — property segment."

      - name: region
        data_type: varchar
        description: "Denormalized from dim_listing — administrative region."

      - name: city
        data_type: varchar
        description: "Denormalized from dim_listing — city."

      - name: agent_id
        data_type: varchar
        description: "Denormalized from dim_listing — responsible agent."

      - name: listing_price
        data_type: decimal(12,2)
        description: "Denormalized from dim_listing — listing price in EUR at mart build time."

      - name: listing_is_active
        data_type: boolean
        description: "Denormalized from dim_listing — whether the listing was active at mart build time."

unit_tests:

  - name: test_orphaned_lead_preserved_with_null_attributes
    description: >
      Leads for deleted or missing listings must not be silently dropped — the
      LEFT JOIN must preserve them with NULL for all denormalized listing columns.
      Dropping orphaned leads would undercount pipeline activity and bias
      source-level conversion-rate calculations, especially after listings are
      purged or migrated across systems.
    model: fct_leads
    given:
      - input: ref('stg_leads')
        rows:
          - {contact_id: 'C_ORPHAN', listing_id: 'L_DELETED', contact_source: 'paid', contact_timestamp: '2025-03-15 11:00:00'}
      - input: ref('dim_listing')
        rows: []
    expect:
      rows:
        - {contact_id: 'C_ORPHAN', listing_id: 'L_DELETED', property_type: null, region: null, city: null, agent_id: null, listing_price: null, listing_is_active: null}
